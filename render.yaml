services:
  - type: web
    name: ticket-watch-server
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: TICKET_WATCH_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM
        sync: false
      - key: TWILIO_TO
        sync: false
      - key: TWILIO_CONTENT_SID
        sync: false
    disk:
      name: ticket-watch-data
      mountPath: /var/data
      sizeGB: 1
